<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interval Chime Timer</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top, rgba(215, 171, 92, 0.2), transparent 35%),
                linear-gradient(160deg, #102019 0%, #182f25 50%, #0a1310 100%);
            color: #f6f1e8;
            font-family: Georgia, "Times New Roman", serif;
        }

        .panel {
            width: min(100%, 420px);
            padding: 28px;
            border: 1px solid rgba(246, 241, 232, 0.14);
            border-radius: 24px;
            background: rgba(9, 15, 12, 0.72);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(12px);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 32px;
            font-weight: 400;
            text-align: center;
        }

        .subtitle {
            margin: 0 0 24px;
            color: rgba(246, 241, 232, 0.74);
            text-align: center;
            font-size: 15px;
        }

        .setup-screen,
        .timer-screen {
            display: grid;
            gap: 18px;
        }

        .timer-screen {
            display: none;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        label {
            font-size: 14px;
            color: rgba(246, 241, 232, 0.86);
        }

        select,
        button {
            width: 100%;
            border-radius: 14px;
            border: 1px solid rgba(246, 241, 232, 0.15);
            font: inherit;
        }

        select {
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.06);
            color: #f6f1e8;
        }

        option {
            color: #111;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 6px;
        }

        button {
            padding: 14px 16px;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
            transform: none;
        }

        .go-btn {
            background: #d7ab5c;
            color: #1e1609;
            border-color: transparent;
            font-weight: 700;
        }

        .stop-btn {
            background: transparent;
            color: #f6f1e8;
        }

        .display {
            padding: 24px 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .countdown {
            margin: 0;
            font-size: clamp(42px, 10vw, 64px);
            letter-spacing: 0.08em;
        }

        .status {
            margin: 12px 0 0;
            color: rgba(246, 241, 232, 0.72);
            font-size: 15px;
        }

        @media (max-width: 480px) {
            .panel {
                padding: 22px;
            }

            .actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="panel">
        <section id="setupScreen" class="setup-screen">
            <div class="field">
                <label for="minutesSelect">Minutes per round</label>
                <select id="minutesSelect">
                    <option value="1">1 minute</option>
                    <option value="2">2 minutes</option>
                    <option value="3">3 minutes</option>
                    <option value="5">5 minutes</option>
                    <option value="10">10 minutes</option>
                    <option value="15">15 minutes</option>
                    <option value="20">20 minutes</option>
                    <option value="30">30 minutes</option>
                </select>
            </div>

            <div class="field">
                <label for="repeatsSelect">Number of repeats</label>
                <select id="repeatsSelect">
                    <option value="1">1 repeat</option>
                    <option value="2">2 repeats</option>
                    <option value="3">3 repeats</option>
                    <option value="4">4 repeats</option>
                    <option value="5">5 repeats</option>
                    <option value="10">10 repeats</option>
                </select>
            </div>

            <button id="goBtn" class="go-btn" type="button">Start</button>
        </section>

        <section id="timerScreen" class="timer-screen">
            <div class="display">
                <p id="countdown" class="countdown">00 : 00</p>
                <p id="status" class="status">Starting...</p>
            </div>

            <button id="stopBtn" class="stop-btn" type="button">Stop</button>
        </section>
    </main>

    <script>
        const minutesSelect = document.getElementById("minutesSelect");
        const repeatsSelect = document.getElementById("repeatsSelect");
        const setupScreen = document.getElementById("setupScreen");
        const timerScreen = document.getElementById("timerScreen");
        const goBtn = document.getElementById("goBtn");
        const stopBtn = document.getElementById("stopBtn");
        const countdown = document.getElementById("countdown");
        const statusText = document.getElementById("status");
        const silentAudio = new Audio("silent1min.mp3");
        const chimeAudio = new Audio("chime.mp3");

        let totalRounds = 0;
        let minutesPerRound = 0;
        let currentRound = 0;
        let currentMinuteSegment = 0;
        let roundEndTime = 0;
        let countdownTimer = null;
        let isRunning = false;
        let sessionContext = null;
        let silentBuffer = null;
        let chimeBuffer = null;
        let sessionStartTime = 0;
        let scheduledRoundEndTimes = [];
        let sessionStopTimer = null;
        let useScheduledPlayback = false;

        function formatTime(totalSeconds) {
            const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
            const seconds = String(totalSeconds % 60).padStart(2, "0");
            return `${minutes} : ${seconds}`;
        }

        function updateCountdown() {
            if (!isRunning) {
                return;
            }

            refreshRoundProgress();

            const secondsRemaining = Math.max(0, Math.ceil((roundEndTime - Date.now()) / 1000));
            countdown.textContent = formatTime(secondsRemaining);
        }

        function startCountdown() {
            clearInterval(countdownTimer);
            updateCountdown();
            countdownTimer = setInterval(updateCountdown, 250);
        }

        function showSetupScreen() {
            setupScreen.style.display = "grid";
            timerScreen.style.display = "none";
        }

        function showTimerScreen() {
            setupScreen.style.display = "none";
            timerScreen.style.display = "grid";
        }

        function resetUI(message) {
            isRunning = false;
            clearInterval(countdownTimer);
            countdownTimer = null;
            clearTimeout(sessionStopTimer);
            sessionStopTimer = null;
            roundEndTime = 0;
            currentRound = 0;
            currentMinuteSegment = 0;
            scheduledRoundEndTimes = [];
            countdown.textContent = "00 : 00";
            statusText.textContent = message;
            goBtn.disabled = false;
            showSetupScreen();

            if (sessionContext) {
                sessionContext.close().catch(() => {});
                sessionContext = null;
            }

            silentAudio.pause();
            silentAudio.currentTime = 0;
            chimeAudio.pause();
            chimeAudio.currentTime = 0;
            useScheduledPlayback = false;
        }

        async function loadAudioBuffer(context, path) {
            const response = await fetch(path);

            if (!response.ok) {
                throw new Error(`Could not load ${path}`);
            }

            const fileBuffer = await response.arrayBuffer();
            return await context.decodeAudioData(fileBuffer);
        }

        async function ensureBuffers(context) {
            if (!silentBuffer) {
                silentBuffer = await loadAudioBuffer(context, "silent1min.mp3");
            }

            if (!chimeBuffer) {
                chimeBuffer = await loadAudioBuffer(context, "chime.mp3");
            }
        }

        function scheduleSession() {
            sessionStartTime = sessionContext.currentTime + 0.05;
            scheduledRoundEndTimes = [];

            let nextStartTime = sessionStartTime;

            for (let roundIndex = 0; roundIndex < totalRounds; roundIndex += 1) {
                for (let minuteIndex = 0; minuteIndex < minutesPerRound; minuteIndex += 1) {
                    const silentSource = sessionContext.createBufferSource();
                    silentSource.buffer = silentBuffer;
                    silentSource.connect(sessionContext.destination);
                    silentSource.start(nextStartTime);
                    nextStartTime += silentBuffer.duration;
                }

                scheduledRoundEndTimes.push(nextStartTime);

                const chimeSource = sessionContext.createBufferSource();
                chimeSource.buffer = chimeBuffer;
                chimeSource.connect(sessionContext.destination);
                chimeSource.start(nextStartTime);
                nextStartTime += chimeBuffer.duration;
            }

            const firstRoundDurationMs = minutesPerRound * 60 * 1000;
            roundEndTime = Date.now() + firstRoundDurationMs;
            currentRound = 1;
            statusText.textContent = `Round ${currentRound} of ${totalRounds}`;
            startCountdown();

            const totalDurationMs = Math.max(0, (nextStartTime - sessionContext.currentTime) * 1000);
            sessionStopTimer = window.setTimeout(() => {
                if (isRunning) {
                    resetUI("All rounds complete.");
                }
            }, totalDurationMs + 150);
        }

        function refreshRoundProgress() {
            if (!isRunning || !sessionContext || !useScheduledPlayback) {
                return;
            }

            const elapsedSeconds = Math.max(0, sessionContext.currentTime - sessionStartTime);

            for (let index = 0; index < scheduledRoundEndTimes.length; index += 1) {
                const roundEndAudioTime = scheduledRoundEndTimes[index] - sessionStartTime;

                if (elapsedSeconds < roundEndAudioTime) {
                    currentRound = index + 1;
                    roundEndTime = Date.now() + Math.max(0, (roundEndAudioTime - elapsedSeconds) * 1000);
                    statusText.textContent = `Round ${currentRound} of ${totalRounds}`;
                    return;
                }

                if (elapsedSeconds < roundEndAudioTime + chimeBuffer.duration) {
                    currentRound = index + 1;
                    roundEndTime = Date.now();
                    statusText.textContent = `Round ${currentRound} complete. Playing chime...`;
                    return;
                }
            }

            roundEndTime = Date.now();
            countdown.textContent = "00 : 00";
        }

        async function playMinuteSegmentFallback() {
            if (!isRunning) {
                return;
            }

            currentMinuteSegment += 1;
            silentAudio.currentTime = 0;
            await silentAudio.play();
        }

        async function finishRoundFallback() {
            if (!isRunning) {
                return;
            }

            statusText.textContent = `Round ${currentRound} complete. Playing chime...`;
            countdown.textContent = "00 : 00";
            chimeAudio.currentTime = 0;
            await chimeAudio.play();
        }

        async function startRoundFallback(roundNumber) {
            currentRound = roundNumber;
            currentMinuteSegment = 0;
            roundEndTime = Date.now() + (minutesPerRound * 60 * 1000);
            statusText.textContent = `Round ${currentRound} of ${totalRounds}`;
            startCountdown();
            await playMinuteSegmentFallback();
        }

        silentAudio.addEventListener("ended", async () => {
            if (!isRunning || useScheduledPlayback) {
                return;
            }

            if (currentMinuteSegment < minutesPerRound) {
                await playMinuteSegmentFallback();
                return;
            }

            await finishRoundFallback();
        });

        chimeAudio.addEventListener("ended", async () => {
            if (!isRunning || useScheduledPlayback) {
                return;
            }

            if (currentRound >= totalRounds) {
                resetUI("All rounds complete.");
                return;
            }

            await startRoundFallback(currentRound + 1);
        });

        goBtn.addEventListener("click", async () => {
            if (isRunning) {
                return;
            }

            minutesPerRound = Number(minutesSelect.value);
            totalRounds = Number(repeatsSelect.value);
            isRunning = true;
            goBtn.disabled = true;
            showTimerScreen();
            statusText.textContent = "Starting...";

            try {
                sessionContext = new (window.AudioContext || window.webkitAudioContext)();
                await ensureBuffers(sessionContext);
                await sessionContext.resume();
                useScheduledPlayback = true;
                scheduleSession();
            } catch (error) {
                console.warn("Scheduled playback unavailable, using media element fallback.", error);

                if (sessionContext) {
                    sessionContext.close().catch(() => {});
                    sessionContext = null;
                }

                try {
                    useScheduledPlayback = false;
                    await startRoundFallback(1);
                } catch (fallbackError) {
                    console.error(fallbackError);
                    resetUI("Playback could not start. Press Go again after allowing audio.");
                }
            }
        });

        stopBtn.addEventListener("click", () => {
            resetUI("Timer stopped.");
        });

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                refreshRoundProgress();
                updateCountdown();
            }
        });
    </script>
</body>
</html>
