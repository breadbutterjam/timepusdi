<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun & Moon — Mumbai</title>
<script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #000; }
#app {
  font-family: system-ui, sans-serif;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* SKY */
.sky {
  flex: 0 0 80%;
  display: flex;
  position: relative;
  overflow: hidden;
}
.panel {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.panel-label {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 18px;
  font-weight: 500;
  color: rgba(255,255,255,0.9);
  pointer-events: none;
  z-index: 2;
}
.divider {
  position: absolute;
  top: 0; bottom: 0;
  left: 50%;
  width: 1px;
  background: rgba(0,0,0,0.35);
  z-index: 4;
}
.altitude-axis {
  position: absolute;
  top: 0; right: 0;
  height: 100%;
  width: 32px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 8px 4px;
  z-index: 3;
  pointer-events: none;
}
.alt-tick {
  font-size: 10px;
  color: rgba(255,255,255,0.65);
  text-align: right;
}
.body {
  position: absolute;
  border-radius: 50%;
  z-index: 5;
  transform: translate(-50%, 50%);
}
.sun-body {
  width: clamp(32px, 8vw, 54px);
  height: clamp(32px, 8vw, 54px);
  background: #ccff00;
}
.moon-body {
  width: clamp(22px, 5.5vw, 38px);
  height: clamp(22px, 5.5vw, 38px);
  background: #e8e8d0;
}

/* HORIZON BAR — date/time pill sits here */
.horizon-bar {
  position: absolute;
  top: 80vh;
  translate: 0 -26px;
  height: 36px;
  /* background: #143f08; */
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  flex-shrink: 0;
}
.datetime-pill {
  display: flex;
  align-items: center;
  gap: 0;
  /* background: rgba(0,0,0,0.35);
  border-radius: 20px; */
  overflow: hidden;
  /* border: 1px solid rgba(255,255,255,0.2); */
}
.pill-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.9);
  font-size: 13px;
  font-family: system-ui, sans-serif;
  padding: 5px 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.pill-btn:hover { background: rgba(255,255,255,0.1); }
.pill-sep {
  width: 1px;
  height: 16px;
  background: rgba(255,255,255,0.25);
  flex-shrink: 0;
}

/* TIME SLIDER — slides out just below horizon */
.slider-tray {
  height: 0;
  overflow: hidden;
  background: #1a5c0a;
  transition: height 0.25s ease;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  justify-content: center;
  padding: 0 16px;
}
.slider-tray.open {
  height: 52px;
}
.slider-tray input[type=range] {
  width: 100%;
  accent-color: #ccff00;
  cursor: pointer;
}
.slider-labels {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: rgba(255,255,255,0.55);
  margin-top: 2px;
}

/* GROUND */
.ground-bar {
  flex: 1;
  min-height: 0;
  background: #1a5c0a;
  display: flex;
  align-items: flex-end;
  justify-content: space-around;
  padding: 0 8px 10px;
}
.ground-item {
  text-align: center;
  color: rgba(255,255,255,0.85);
  line-height: 1.3;
}
.ground-item span {
  display: block;
  font-size: 10px;
  opacity: 0.7;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.ground-item strong {
  display: block;
  font-size: clamp(11px, 2.5vw, 14px);
  font-weight: 500;
}

/* hidden date input */
#dateInput {
  position: absolute;
  opacity: 0;
  pointer-events: none;
  width: 1px; height: 1px;
}
</style>
</head>
<body>
<div id="app">
  <div class="sky" id="sky">
    <div class="panel" id="panelEast">
      <span class="panel-label">E</span>
    </div>
    <div class="panel" id="panelWest">
      <span class="panel-label">W</span>
      <div class="altitude-axis" id="altAxis"></div>
    </div>
    <div class="divider"></div>
  </div>

  <div class="horizon-bar">
    <div class="datetime-pill">
      <button class="pill-btn" id="dateBtn"></button>
      <div class="pill-sep"></div>
      <button class="pill-btn" id="timeBtn"></button>
    </div>
    <input type="date" id="dateInput">
  </div>

  <div class="slider-tray" id="sliderTray">
    <input type="range" id="timeSlider" min="0" max="1439" step="1">
    <div class="slider-labels">
      <span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>24:00</span>
    </div>
  </div>

  <div class="ground-bar" id="groundBar"></div>
</div>

<script>
(function() {
  const LAT = 19.076, LNG = 72.8777;

  const now = new Date();
  let selDate = { y: now.getFullYear(), m: now.getMonth(), d: now.getDate() };
  let selMinutes = now.getHours() * 60 + now.getMinutes();
  let sliderOpen = false;

  function getDateTime() {
    const dt = new Date(selDate.y, selDate.m, selDate.d);
    dt.setHours(Math.floor(selMinutes / 60), selMinutes % 60, 0, 0);
    return dt;
  }

  function fmtTime(minutes) {
    const h = String(Math.floor(minutes / 60)).padStart(2, "0");
    const m = String(minutes % 60).padStart(2, "0");
    return h + ":" + m;
  }

  function fmtDateLabel(y, m, d) {
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return String(d).padStart(2,"0") + "-" + months[m] + "-" + y;
  }

  function getSkyColor(sunAlt) {
    if (sunAlt > 10) return "#69c0f5";
    if (sunAlt > 0) return "#88aacc";
    if (sunAlt > -6) return "#334466";
    return "#0a0e1f";
  }

  function fmt(d) {
    return d.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", hour12: false });
  }

  function render() {
    const dt = getDateTime();
    const sunPos = SunCalc.getPosition(dt, LAT, LNG);
    const moonPos = SunCalc.getMoonPosition(dt, LAT, LNG);
    const sunTimes = SunCalc.getTimes(dt, LAT, LNG);
    const moonTimes = SunCalc.getMoonTimes(dt, LAT, LNG);

    const sunAltDeg = sunPos.altitude * (180 / Math.PI);
    const moonAltDeg = moonPos.altitude * (180 / Math.PI);
    const sunAzDeg = sunPos.azimuth * (180 / Math.PI) + 180;
    const moonAzDeg = moonPos.azimuth * (180 / Math.PI) + 180;

    const bg = getSkyColor(sunAltDeg);
    document.getElementById("panelEast").style.background = bg;
    document.getElementById("panelWest").style.background = bg;

    const skyEl = document.getElementById("sky");
    const skyH = skyEl.offsetHeight;

    function altToBottomPx(altDeg) {
      return (altDeg / 90) * skyH;
    }

    function placeBody(id, altDeg, panel) {
      const existing = document.getElementById(id);
      if (existing) existing.remove();
      if (altDeg <= 0) return;
      const div = document.createElement("div");
      div.id = id;
      div.className = "body " + (id === "sun" ? "sun-body" : "moon-body");
      div.style.left = "50%";
      div.style.bottom = altToBottomPx(altDeg) + "px";
      panel.appendChild(div);
    }

    const eastPanel = document.getElementById("panelEast");
    const westPanel = document.getElementById("panelWest");
    placeBody("sun", sunAltDeg, (sunAzDeg < 180) ? eastPanel : westPanel);
    placeBody("moon", moonAltDeg, (moonAzDeg < 180) ? eastPanel : westPanel);

    const axis = document.getElementById("altAxis");
    axis.innerHTML = "";
    [90, 75, 60, 45, 30, 15, 0].forEach(deg => {
      const tick = document.createElement("div");
      tick.className = "alt-tick";
      tick.textContent = deg + "°";
      axis.appendChild(tick);
    });

    const sunAltLabel = sunAltDeg > 0 ? sunAltDeg.toFixed(1) + "°" : "Below";
    const moonAltLabel = moonAltDeg > 0 ? moonAltDeg.toFixed(1) + "°" : "Below";
    const moonrise = moonTimes.rise ? fmt(moonTimes.rise) : "--:--";
    const moonset = moonTimes.set ? fmt(moonTimes.set) : "--:--";

    document.getElementById("groundBar").innerHTML = `
      <div class="ground-item"><span>Sunrise</span><strong>${fmt(sunTimes.sunrise)}</strong></div>
      <div class="ground-item"><span>Sunset</span><strong>${fmt(sunTimes.sunset)}</strong></div>
      <div class="ground-item"><span>&#9728; Alt</span><strong>${sunAltLabel}</strong></div>
      <div class="ground-item"><span>Moonrise</span><strong>${moonrise}</strong></div>
      <div class="ground-item"><span>Moonset</span><strong>${moonset}</strong></div>
      <div class="ground-item"><span>&#9790; Alt</span><strong>${moonAltLabel}</strong></div>
    `;

    document.getElementById("dateBtn").textContent = fmtDateLabel(selDate.y, selDate.m, selDate.d);
    document.getElementById("timeBtn").textContent = fmtTime(selMinutes);
    document.getElementById("timeSlider").value = selMinutes;
  }

  // Date picker
  const dateInput = document.getElementById("dateInput");
  document.getElementById("dateBtn").addEventListener("click", () => {
    const iso = `${selDate.y}-${String(selDate.m+1).padStart(2,"0")}-${String(selDate.d).padStart(2,"0")}`;
    dateInput.value = iso;
    dateInput.style.pointerEvents = "auto";
    dateInput.showPicker ? dateInput.showPicker() : dateInput.click();
  });
  dateInput.addEventListener("change", () => {
    const parts = dateInput.value.split("-");
    selDate = { y: +parts[0], m: +parts[1]-1, d: +parts[2] };
    dateInput.style.pointerEvents = "none";
    render();
  });

  // Time button toggles slider
  document.getElementById("timeBtn").addEventListener("click", () => {
    sliderOpen = !sliderOpen;
    document.getElementById("sliderTray").classList.toggle("open", sliderOpen);
  });

  // Slider scrub
  document.getElementById("timeSlider").addEventListener("input", e => {
    selMinutes = +e.target.value;
    render();
  });

  function waitAndRender() {
    if (typeof SunCalc === "undefined") { setTimeout(waitAndRender, 50); return; }
    render();
  }
  waitAndRender();
})();
</script>
</body>
</html>
