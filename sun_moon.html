<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun & Moon</title>
<script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; height: 100dvh; overflow: hidden; background: #000; }
#app {
  font-family: system-ui, sans-serif;
  width: 100%;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  position: relative;
}

#locationSelect{
  text-align: right;
  appearance: none;
  -webkit-appearance: none; /* Chrome, Safari */
  -moz-appearance: none;    /* Firefox */
}

#locationSelect::-ms-expand {
  display: none; /* Internet Explorer */
}

/* ── TOP BAR ── */
.top-bar {
  /* position: absolute; */
  background: #000035 ;
  top: 0; left: 0; right: 0;
  /* height: 32px; */
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 12px;
  /* background: linear-gradient(to bottom, rgba(0,0,0,0.45), rgba(0,0,0,0.0)); */
  gap: 8px;
}
.top-bar select,
.top-bar button {
  background: none;
  border: none;
  color: rgba(255,255,255,0.82);
  font-size: 12px;
  font-family: system-ui, sans-serif;
  cursor: pointer;
  padding: 0;
  outline: none;
  letter-spacing: 0.02em;
}
.top-bar select option,
.top-bar select optgroup {
  background: #1a2a1a;
  color: #fff;
}
.top-bar .sep {
  color: rgba(255,255,255,0.25);
  font-size: 11px;
  flex-shrink: 0;
}
.top-bar .spacer { flex: 1; }

/* ── TIME SLIDER TRAY — overlays just below top bar ── */
.slider-tray {
  position: absolute;
  top: 16px;
  left: 0; right: 0;
  z-index: 19;
  height: 0;
  overflow: hidden;
  transition: height 0.2s ease;
  background: linear-gradient(to bottom, rgba(0,0,0,0.38), rgba(0,0,0,0.0));
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 14px;
}
.slider-tray.open { height: 44px; }
.slider-tray input[type=range] {
  width: 100%;
  accent-color: rgba(255,255,255,0.75);
  cursor: pointer;
  height: 2px;
}
.slider-labels {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: rgba(255,255,255,0.38);
  margin-top: 3px;
}

/* ── SKY ── */
.sky {
  flex: 0 0 80%;
  display: flex;
  position: relative;
  overflow: hidden;
}
.panel {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.panel-label {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 18px;
  font-weight: 500;
  color: rgba(255,255,255,0.9);
  pointer-events: none;
  z-index: 2;
}
.divider {
  position: absolute;
  top: 0; bottom: 0;
  left: 50%;
  width: 1px;
  background: rgba(0,0,0,0.35);
  z-index: 4;
}
.altitude-axis {
  position: absolute;
  top: 0; right: 0;
  height: 100%;
  width: 32px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 8px 4px;
  z-index: 3;
  pointer-events: none;
}
.alt-tick {
  font-size: 10px;
  color: rgba(255,255,255,0.65);
  text-align: right;
}
.body {
  position: absolute;
  border-radius: 50%;
  z-index: 5;
  transform: translate(-50%, 50%);
}
.sun-body {
  width: clamp(32px, 8vw, 54px);
  height: clamp(32px, 8vw, 54px);
  background: #ccff00;
}
.moon-body {
  width: clamp(22px, 5.5vw, 38px);
  height: clamp(22px, 5.5vw, 38px);
  background: #e8e8d0;
}

/* ── HORIZON + GROUND ── */
.horizon-bar {
  height: 2px;
  background: rgba(255,255,255,0.12);
  flex-shrink: 0;
}
.ground-bar {
  flex: 1;
  min-height: 0;
  background: #1a5c0a;
  display: flex;
  align-items: flex-end;
  justify-content: space-around;
  padding: 0 8px 10px;
}
.ground-item {
  text-align: left;
  color: rgba(255,255,255,0.85);
  line-height: 1.3;
}
.ground-item span {
  display: block;
  font-size: 10px;
  opacity: 0.7;
  /* text-transform: uppercase; */
  letter-spacing: 0.04em;
}
.ground-item strong {
  display: block;
  font-size: clamp(11px, 2.5vw, 14px);
  font-weight: 500;
}

#dateInput {
  position: absolute;
  opacity: 0;
  pointer-events: none;
  width: 1px; height: 1px;
}
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div style="display: flex; align-items: center; gap: 8px;">
      <button id="dateBtn"></button>
      <!-- <span class="sep">·</span> -->
      <button id="timeBtn"></button>
    </div>
    <select id="locationSelect"></select>
    <!-- <span class="sep">·</span> -->
    

  </div>

  <!-- TIME SLIDER (overlays below top bar) -->
  <div class="slider-tray" id="sliderTray">
    <input type="range" id="timeSlider" min="0" max="1439" step="1">
    <div class="slider-labels">
      <span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>24:00</span>
    </div>
  </div>

  <!-- SKY -->
  <div class="sky" id="sky">
    <div class="panel" id="panelEast"><span class="panel-label">E</span></div>
    <div class="panel" id="panelWest">
      <span class="panel-label">W</span>
      <div class="altitude-axis" id="altAxis"></div>
    </div>
    <div class="divider"></div>
  </div>

  <div class="horizon-bar"></div>
  <div class="ground-bar" id="groundBar"></div>

  <input type="date" id="dateInput">
</div>

<script>
// ─────────────────────────────────────────────────────────
//  LOCATIONS — edit freely
//  Fields: name, lat, lng, tz (IANA timezone string)
// ─────────────────────────────────────────────────────────
const LOCATIONS = {
  "India": [
    { name: "Mumbai",      lat: 19.0760,  lng:  72.8777, tz: "Asia/Kolkata"       },
    { name: "Pune",        lat: 18.5204,  lng:  73.8567, tz: "Asia/Kolkata"       },
    { name: "Delhi",       lat: 28.6139,  lng:  77.2090, tz: "Asia/Kolkata"       },
    { name: "Bangalore",   lat: 12.9716,  lng:  77.5946, tz: "Asia/Kolkata"       },
    { name: "Chennai",     lat: 13.0827,  lng:  80.2707, tz: "Asia/Kolkata"       },
    { name: "Kolkata",     lat: 22.5726,  lng:  88.3639, tz: "Asia/Kolkata"       },
  ],
  "Global": [
    { name: "Dubai",       lat: 25.2048,  lng:  55.2708, tz: "Asia/Dubai"         },
    { name: "London",      lat: 51.5074,  lng:  -0.1278, tz: "Europe/London"      },
    { name: "Paris",       lat: 48.8566,  lng:   2.3522, tz: "Europe/Paris"       },
    { name: "New York",    lat: 40.7128,  lng: -74.0060, tz: "America/New_York"   },
    { name: "Los Angeles", lat: 34.0522,  lng:-118.2437, tz: "America/Los_Angeles"},
    { name: "São Paulo",   lat:-23.5505,  lng: -46.6333, tz: "America/Sao_Paulo"  },
    { name: "Tokyo",       lat: 35.6762,  lng: 139.6503, tz: "Asia/Tokyo"         },
    { name: "Singapore",   lat:  1.3521,  lng: 103.8198, tz: "Asia/Singapore"     },
    { name: "Sydney",      lat:-33.8688,  lng: 151.2093, tz: "Australia/Sydney"   },
    { name: "Cape Town",   lat:-33.9249,  lng:  18.4241, tz: "Africa/Johannesburg"},
  ]
};
// ─────────────────────────────────────────────────────────

(function () {
  // ── Build location <select> ──
  const selEl = document.getElementById("locationSelect");
  Object.entries(LOCATIONS).forEach(([group, cities]) => {
    const og = document.createElement("optgroup");
    og.label = group;
    cities.forEach(city => {
      const opt = document.createElement("option");
      opt.value = JSON.stringify({ lat: city.lat, lng: city.lng, tz: city.tz });
      opt.textContent = city.name;
      if (city.name === "Mumbai") opt.selected = true;
      og.appendChild(opt);
    });
    selEl.appendChild(og);
  });

  // ── Helper: get local "now" minutes for a timezone ──
  function localNowMinutes(tz) {
    const parts = new Intl.DateTimeFormat("en-US", {
      timeZone: tz,
      hour: "numeric", minute: "numeric", hour12: false
    }).formatToParts(new Date());
    const h = +parts.find(p => p.type === "hour").value;
    const m = +parts.find(p => p.type === "minute").value;
    return h * 60 + m;
  }

  // ── Helper: get local today {y,m,d} for a timezone ──
  function localToday(tz) {
    const parts = new Intl.DateTimeFormat("en-US", {
      timeZone: tz,
      year: "numeric", month: "numeric", day: "numeric"
    }).formatToParts(new Date());
    return {
      y: +parts.find(p => p.type === "year").value,
      m: +parts.find(p => p.type === "month").value - 1,
      d: +parts.find(p => p.type === "day").value
    };
  }

  let loc       = JSON.parse(selEl.value);
  let selDate   = localToday(loc.tz);
  let selMinutes = localNowMinutes(loc.tz);
  let sliderOpen = false;

  // Build a real UTC-correct Date from the city's local y/m/d + minutes
  function getDateTime() {
    // Format a local-time string and parse it as if it's in the city's tz
    const hh = String(Math.floor(selMinutes / 60)).padStart(2,"0");
    const mm = String(selMinutes % 60).padStart(2,"0");
    const iso = `${selDate.y}-${String(selDate.m+1).padStart(2,"0")}-${String(selDate.d).padStart(2,"0")}T${hh}:${mm}:00`;
    // Use Temporal-free approach: find the UTC offset for this tz at roughly this moment
    // by formatting a known UTC time and comparing
    const approx = new Date(`${iso}Z`); // treat as UTC first to get ballpark
    const localStr = new Intl.DateTimeFormat("en-US", {
      timeZone: loc.tz,
      year:"numeric", month:"2-digit", day:"2-digit",
      hour:"2-digit", minute:"2-digit", second:"2-digit", hour12: false
    }).format(approx);
    // Parse what the tz thinks approx UTC is
    const [datePart, timePart] = localStr.split(", ");
    const [mo, dy, yr] = datePart.split("/");
    const [tH, tM, tS] = timePart.split(":");
    const tzDate = new Date(Date.UTC(+yr, +mo-1, +dy, +tH, +tM, +tS));
    // Offset = approx - tzDate (difference between UTC and what tz rendered)
    const offsetMs = approx - tzDate;
    // Final correct UTC moment
    return new Date(approx.getTime() + offsetMs);
  }

  function fmtTime(m) {
    return String(Math.floor(m / 60)).padStart(2,"0") + ":" + String(m % 60).padStart(2,"0");
  }

  function fmtDateLabel(y, m, d) {
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return String(d).padStart(2,"0") + "-" + months[m] + "-" + y;
  }

  function getSkyColor(alt) {
    if (alt > 10) return "#69c0f5";
    if (alt > 0)  return "#88aacc";
    if (alt > -6) return "#334466";
    return "#0a0e1f";
  }

  // Format a Date in the currently selected city's local timezone
  function fmt(d) {
    return new Intl.DateTimeFormat("en-US", {
      timeZone: loc.tz,
      hour: "2-digit", minute: "2-digit", hour12: false
    }).format(d);
  }

  function render() {
    const dt       = getDateTime();
    const sunPos   = SunCalc.getPosition(dt, loc.lat, loc.lng);
    const moonPos  = SunCalc.getMoonPosition(dt, loc.lat, loc.lng);
    const sunTimes = SunCalc.getTimes(dt, loc.lat, loc.lng);
    const moonTimes= SunCalc.getMoonTimes(dt, loc.lat, loc.lng);

    const sunAlt  = sunPos.altitude  * (180 / Math.PI);
    const moonAlt = moonPos.altitude * (180 / Math.PI);
    const sunAz   = sunPos.azimuth   * (180 / Math.PI) + 180;
    const moonAz  = moonPos.azimuth  * (180 / Math.PI) + 180;

    const bg = getSkyColor(sunAlt);
    document.getElementById("panelEast").style.background = bg;
    document.getElementById("panelWest").style.background = bg;

    const skyEl = document.getElementById("sky");
    const skyH  = skyEl.offsetHeight;

    // Body sizes must match CSS clamp values
    const sunR  = Math.min(Math.max(window.innerWidth * 0.08, 32), 54) / 2;
    const moonR = Math.min(Math.max(window.innerWidth * 0.055, 22), 38) / 2;

    function place(id, altDeg, panel) {
      const ex = document.getElementById(id);
      if (ex) ex.remove();
      const r = id === "sun" ? sunR : moonR;
      // Hide when the top edge (center + r) is still below horizon
      if (altDeg <= 0 && (altDeg / 90) * skyH + r <= 0) return;
      const div = document.createElement("div");
      div.id = id;
      div.className = "body " + (id === "sun" ? "sun-body" : "moon-body");
      div.style.left   = "50%";
      // Subtract radius so the top edge of the circle = the altitude position
      div.style.bottom = (altDeg / 90) * skyH - r + "px";
      panel.appendChild(div);
    }

    const E = document.getElementById("panelEast");
    const W = document.getElementById("panelWest");
    place("sun",  sunAlt,  sunAz  < 180 ? E : W);
    place("moon", moonAlt, moonAz < 180 ? E : W);

    const axis = document.getElementById("altAxis");
    axis.innerHTML = "";
    [90,75,60,45,30,15,0].forEach(deg => {
      const t = document.createElement("div");
      t.className = "alt-tick";
      t.textContent = deg + "°";
      axis.appendChild(t);
    });

    document.getElementById("groundBar").innerHTML = `
      <div class="ground-item"><span>Sunrise</span><strong>${fmt(sunTimes.sunrise)}</strong></div>
      <div class="ground-item"><span>Sunset</span><strong>${fmt(sunTimes.sunset)}</strong></div>
      <div class="ground-item"><span>&#9728; Alt</span><strong>${sunAlt > 0 ? sunAlt.toFixed(1)+"°" : "Below"}</strong></div>
      <div class="ground-item"><span>Moonrise</span><strong>${moonTimes.rise ? fmt(moonTimes.rise) : "--:--"}</strong></div>
      <div class="ground-item"><span>Moonset</span><strong>${moonTimes.set ? fmt(moonTimes.set) : "--:--"}</strong></div>
      <div class="ground-item"><span>&#9790; Alt</span><strong>${moonAlt > 0 ? moonAlt.toFixed(1)+"°" : "Below"}</strong></div>
    `;

    document.getElementById("dateBtn").textContent = fmtDateLabel(selDate.y, selDate.m, selDate.d);
    document.getElementById("timeBtn").textContent = fmtTime(selMinutes);
    document.getElementById("timeSlider").value = selMinutes;
  }

  // ── Location switch → snap to local now ──
  selEl.addEventListener("change", () => {
    loc        = JSON.parse(selEl.value);
    selDate    = localToday(loc.tz);
    selMinutes = localNowMinutes(loc.tz);
    render();
  });

  // ── Date picker ──
  const dateInput = document.getElementById("dateInput");
  document.getElementById("dateBtn").addEventListener("click", () => {
    dateInput.value = `${selDate.y}-${String(selDate.m+1).padStart(2,"0")}-${String(selDate.d).padStart(2,"0")}`;
    dateInput.style.pointerEvents = "auto";
    dateInput.showPicker ? dateInput.showPicker() : dateInput.click();
  });
  dateInput.addEventListener("change", () => {
    const [y, m, d] = dateInput.value.split("-");
    selDate = { y: +y, m: +m - 1, d: +d };
    dateInput.style.pointerEvents = "none";
    render();
  });

  // ── Time toggle + scrub ──
  document.getElementById("timeBtn").addEventListener("click", () => {
    sliderOpen = !sliderOpen;
    document.getElementById("sliderTray").classList.toggle("open", sliderOpen);
  });
  document.getElementById("timeSlider").addEventListener("input", e => {
    selMinutes = +e.target.value;
    render();
  });

  function waitAndRender() {
    if (typeof SunCalc === "undefined") { setTimeout(waitAndRender, 50); return; }
    render();
  }
  waitAndRender();
})();
</script>
</body>
</html>
