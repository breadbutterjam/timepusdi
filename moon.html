<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NASA Moon (Fixed)</title>

<style>
body {
    background: black;
    color: white;
    text-align: center;
    font-family: Arial;
}
img {
    width: 300px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h2>🌕 NASA Moon Viewer (No 404)</h2>

<input type="date" id="dateInput">
<button onclick="loadMoon()">Load Moon</button>

<br>
<img id="moonImg" alt="Moon image">

<script>

// safer frame calculation
function getFrame(date) {
    const start = new Date(date.getFullYear(), 0, 1);
    const diffDays = (date - start) / (1000 * 60 * 60 * 24);

    // NASA dataset ~ 3600 usable frames (NOT 8760)
    let frame = Math.floor((diffDays / 365) * 3600);

    // clamp range to avoid 404
    frame = Math.max(1, Math.min(frame, 3600));

    return String(frame).padStart(4, '0');
}

function getMoonURL(frame) {
    return `https://svs.gsfc.nasa.gov/vis/a000000/a005100/a005187/frames/640x640_1x1_30p/moon.${frame}.jpg`;
}

function loadMoon() {
    const val = document.getElementById("dateInput").value;
    if (!val) return alert("Pick a date");

    const date = new Date(val);
    const frame = getFrame(date);

    const img = document.getElementById("moonImg");
    const url = getMoonURL(frame);

    // fallback if frame missing
    img.onerror = () => {
        console.warn("Frame not found, fallback used");
        img.src = getMoonURL("0100"); // guaranteed safe fallback
    };

    img.src = url;
}

</script>

</body>
</html>
