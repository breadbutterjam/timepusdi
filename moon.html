<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NASA Moon (ORB Fixed)</title>

<style>
body {
    background: black;
    color: white;
    text-align: center;
    font-family: Arial;
}
img {
    width: 300px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h2>🌕 NASA Moon Viewer (ORB Safe)</h2>

<input type="number" id="frame" placeholder="Enter frame (1–3600)">
<button onclick="loadMoon()">Load</button>

<br>
<img id="moonImg" alt="Moon image">

<script>

function getNASAUrl(frame) {
    return `https://svs.gsfc.nasa.gov/vis/a000000/a005100/a005187/frames/640x640_1x1_30p/moon.${frame}.jpg`;
}

function getProxyUrl(frame) {
    return `https://images.weserv.nl/?url=svs.gsfc.nasa.gov/vis/a000000/a005100/a005187/frames/640x640_1x1_30p/moon.${frame}.jpg`;
}

function loadMoon() {
    let frame = document.getElementById("frame").value || "0100";
    frame = String(frame).padStart(4, '0');

    const img = document.getElementById("moonImg");

    // try NASA first
    img.onerror = () => {
        console.warn("NASA blocked → using proxy");
        img.onerror = null;
        img.src = getProxyUrl(frame);
    };

    img.src = getNASAUrl(frame);
}

</script>

</body>
</html>
