<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomo</title>
    <style>
      

        body{
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: sans-serif;
            /* background-color: #f0f0f0; */
        }
        .bgImage{
            background-image: url("ocean.jpg");
            background-size: cover;
            background-position: center;
            width: 100%;
            height: 100%;
        }
        .timeCont{
            position: absolute;
            font-size: 12.7em;
            color: white;
            /* font-family: 'Arial', sans-serif; */
            font-family: monospace;
            opacity: 0.2;
        }

         @media (max-width: 420px) {
        .timeCont {
            font-size: 9.7em;
        }
       }

        .iconHolder{
            position: absolute;
            top: 4px;
            right: 4px;
            display: flex;
            gap: 8px;   
        }
        
        .icon{
            color: white;
            cursor: pointer;
            opacity: 0.5;
            font-size: 1.27em;
        }

        .settingsPane{
            position: absolute;
            top: 4px;
            right: 4px;
            width: 120px;
            /* height: 300px; */
            background-color: rgba(255,255,255,0.3);
            color: black;
            display: none;
            border-radius: 0.5em;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px;
        }

        .pause{
            opacity: 1;
        }

        .secBtn{
            background-color: white;
            border: 1px saddlebrown;
        }

        .timeSelector{
            font-size: 0.8em;
        }
        #endofTimer{
            display: none;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

            .switch input {
            opacity: 0;
            width: 0;
            height: 0;
            }

            .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #ccc;
            border-radius: 26px;
            transition: 0.3s;
            }

            .slider::before {
            content: "";
            position: absolute;
            height: 20px;
            width: 20px;
            left: 3px;
            top: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
            }

            input:checked + .slider {
            background-color: #2600ff;
            }

            input:checked + .slider::before {
            transform: translateX(24px);
            }

            .fade-out {
                animation: fadeOut 2s forwards;
            }

            @keyframes fadeOut {
            from { opacity: 0.2; }
            to { opacity: 0; }
            }

    </style>
</head>
<body onload="init();">

    <div class="bgImage"></div>
    <div class="timeCont"></div>
    <div class="iconHolder">
        <div class="icon settingsIcon">⚙</div>
        <!-- <div class="icon refreshIcon">⟳</div> -->
        <!-- <div class="icon helpIcon">🛈</div> -->
    </div>

    <div class="settingsPane">
        <div class="settingsControl timeSelector">
            <!-- <span>Select Time:</span><br> -->
            <input type="radio" id="time25" name="timeSel" value="25">
            <label for="time25">25 mins</label><br>
            
            <input type="radio" id="time10" name="timeSel" value="10">
            <label for="time10">10 mins</label><br>
            
            <input type="radio" id="time5" name="timeSel" value="5">
            <label for="time5">5 mins</label><br>

            <input type="radio" id="time2" name="timeSel" value="2" checked>
            <label for="time2">2 mins</label>
            <br>
            <!-- <label class="switch">
                <input type="checkbox" id="toggle">
                <span class="slider"></span>
            </label> -->

        </div>
        <input type="button" id="applyBtn" value="Apply">
        <input type="button" class="secBtn" id="cancelBtn" value="Cancel">
        <audio id="endofTimer" src="ding.mp3" preload="auto"></audio>
    </div>
    <script>
        let mins = 2; // Set the desired minutes for the timer

        let bTimerRunning = false;

        let timeCont = document.querySelector(".timeCont");
        let totalSeconds = mins * 60; // 25 minutes in seconds

        function resetTimer() {
            totalSeconds = mins * 60;
            updateTime();
        }

        function init() {
            // console.log("Initializing...");
            updateTime();
            addEventListeners();
            const settingsPane = document.querySelector(".settingsPane");
            settingsPane.style.display = "none";
            
        }

        function addEventListeners() {
            // console.log("Adding event listeners...");
            timeCont.addEventListener("click", () => {
                // console.log("Time container clicked. Timer running:", bTimerRunning);
                if (bTimerRunning) {
                    clearInterval(intervalId);
                    bTimerRunning = false;
                    timeCont.classList.add("pause");
                } else {
                    timeCont.classList.remove("pause");
                    startTimer();
                }
            });

            // timeCont.addEventListener("animationend", () => {
            //       console.log("Fade out complete");
            //       timeCont.classList.remove("fade-out");
            //     //   timeCont.innerHTML = "";
            //     //   timeCont.classList.add("endState");
            // });

            const settingsIcon = document.querySelector(".settingsIcon");
            const settingsPane = document.querySelector(".settingsPane");
            settingsIcon.addEventListener("click", () => {
                // console.log("Settings icon clicked. Current display:", settingsPane.style.display);
                settingsPane.style.display = "flex";
            });

            const applyBtn = document.querySelector("#applyBtn");
            applyBtn.addEventListener("click", () => {
                applySettings();
                settingsPane.style.display = "none";
            });


            const cancelBtn = document.querySelector("#cancelBtn");
            cancelBtn.addEventListener("click", () => {
                settingsPane.style.display = "none";
            });

            
            window.addEventListener("click", (event) => {
                if (!settingsPane.contains(event.target) && !event.target.classList.contains("settingsIcon")) {
                    settingsPane.style.display = "none";
                }
            });
            
        }

        function applySettings() {
            let selectedTime = document.querySelector('input[name="timeSel"]:checked').value;
            mins = parseInt(selectedTime);
            resetTimer();
            timeCont.classList.remove("pause");
            startTimer();
            
        }

        function updateTime() {
            let minutes = Math.floor(totalSeconds / 60);
            let seconds = totalSeconds % 60;
            timeCont.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            if (minutes === 0 && seconds === 0) {
                // alert("Time's up!");
                const endofTimerAudio = document.querySelector("#endofTimer");
                endofTimerAudio.play();

                timeCont.classList.add("fade-out");
            }
        }

        var intervalId = null;
        function startTimer() {
            bTimerRunning = true;
            if (intervalId) {
                clearInterval(intervalId);
            }
            intervalId = setInterval(() => {
                if (totalSeconds > 0) {
                    totalSeconds--;
                    updateTime();
                }
            }, 1000);
        }

        // const toggle = document.getElementById("toggle");

        // toggle.addEventListener("change", () => {
        //     if (toggle.checked) {
        //     console.log("ON");
        //     } else {
        //     console.log("OFF");
        //     }
        // });

        startTimer();
/*
    
    TO-DOs
    add icons for settings, help, refresh.
        
    end of timer - do something

    settings:
    - select background image
    - select opacity
    - select font
    - sound on / off [tick]
    - music on / off
    
        ..Alarm    

    [DONE]
        pause / resume. 
        icon for setting

        - select time: 25, 10, 5; 

        - end of timer? 

*/
    </script>
    
</body>

</html>
