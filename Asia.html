<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asia – Interactive Learning</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #fafaf7;
}
#practice{
  flex-direction: column;
}

/* Header */
.app-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: #fff;
  border-bottom: 1px solid #eee;
}

h1 {
  flex: 1;
  text-align: center;
  margin: 0;
  font-size: 20px;
}

.title-close {
  border: none;
  background: transparent;
  color: #666;
  cursor: pointer;
  font-size: 20px;
  font-weight: 700;
  line-height: 1;
  padding: 4px 8px;
}

.title-close:hover {
  color: #111;
}

.dsplyNone {
  display: none !important;
}

/* Startup Mode Picker */
.start-modal {
  position: fixed;
  inset: 0;
  z-index: 300;
  background: linear-gradient(145deg, #1a1d3a 0%, #0d2018 100%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.start-card {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.start-header {
  text-align: center;
}

.start-logo {
  font-size: 2.6em;
  line-height: 1;
  margin-bottom: 6px;
}

.start-header h2 {
  margin: 0;
  font-size: 1.35em;
  font-weight: 800;
}

.start-header p {
  margin: 6px 0 0;
  color: rgba(255,255,255,0.65);
  font-size: 0.9em;
}

.start-modes {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

.start-mode-btn {
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.14);
  border-radius: 14px;
  color: #fff;
  cursor: pointer;
  display: grid;
  grid-template-columns: auto 1fr;
  column-gap: 12px;
  row-gap: 2px;
  align-items: center;
  padding: 14px 16px;
  text-align: left;
  transition: background 0.15s, border-color 0.15s, transform 0.12s;
}

.start-mode-btn:hover {
  background: rgba(255,255,255,0.16);
  border-color: rgba(255,255,255,0.32);
  transform: translateY(-1px);
}

.start-mode-btn:active {
  transform: translateY(0);
}

.start-mode-icon {
  grid-row: span 2;
  font-size: 1.55em;
  line-height: 1;
}

.start-mode-name {
  font-size: 0.96em;
  font-weight: 700;
}

.start-mode-desc {
  color: rgba(255,255,255,0.58);
  font-size: 0.72em;
  line-height: 1.35;
}

/* Main Mode Tabs */
.mode-tabs {
  display: flex;
  overflow-x: auto;
  background: #fff;
  border-bottom: 2px solid #ddd;
  position: sticky;
  top: 0;
  z-index: 20;
}

.mode-tabs button {
  flex: 1;
  padding: 14px 16px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 15px;
  font-weight: 500;
  white-space: nowrap;
  color: #666;
}

.mode-tabs button.active {
  color: #333;
  background: #f5f5f5;
  border-bottom: 3px solid #333;
}

/* Sub Tabs (for regions in practice mode) */
.tab {
  display: flex;
  overflow-x: auto;
  background: #fff;
  border-bottom: 1px solid #eee;
  position: sticky;
  top: 0;
  z-index: 10;
}

.tab button {
  flex: none;
  padding: 12px 16px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 14px;
  white-space: nowrap;
}

.tab button.active {
  border-bottom: 2px solid #333;
  font-weight: bold;
}

/* Tab Content */
.mode-content {
  display: none;
}

.mode-content.active {
  display: flex;
}

.tabcontent {
  display: none;
  padding: 12px;
}

/* Table */
table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border-radius: 8px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
}

th {
  background: #f5f5f5;
  text-align: left;
}

/* Flag */
img {
  width: 48px;
  border: 1px solid #eee;
}

/* Quiz Container */
.quiz-container {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
}

.quiz-stats {
  background: #fff;
  padding: 0px 16px 0px 16px;
  border-radius: 8px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-around;
  text-align: center;
  /* display: none;  Hidden by default, show later once randomization logic is refined */
}

.stat-item {
  flex: 1;
}

.stat-value {
  font-size: 24px;
  font-weight: bold;
  color: #333;
}

.stat-label {
  font-size: 12px;
  color: #666;
  margin-top: 4px;
}

.correct { color: #22c55e; }
.incorrect { color: #ef4444; }

.quiz-card {
  background: #fff;
  padding: 24px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  position: relative;
}

.flag-row {
  position: relative;
  display: flex;
  justify-content: center;
}

.quiz-flag {
  width: 100%;
  max-width: 320px;
  border: 2px solid #eee;
  border-radius: 8px;
  margin-bottom: 4px;
}

.onepxHt{
  height: 1px;
  position: relative;
  display: flex;
  justify-content: center;
}

.onepx{
  width: 1px;
  /* background-color: red; */
  position: relative;
  /* height: 32px; */
}




.hint-icon {
  /* 
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px; */
  width: 32px;
  height: 32px;
  /* border: 2px solid #ddd;
  border-radius: 100px;
  background: #fff;
  color: #333; */
  cursor: pointer;
  /* font-size: 17px;
  font-weight: 800;
  line-height: 1; */
  position: absolute;
  right: 0;
  top: 0;
  transform: translateX(100%);
  background-image: url('help.svg');
  background-size: contain;
}

/*.hint-icon:hover,
.hint-icon.active {
   border-color: #3b82f6;
  color: #1d4ed8;
  background: #eff6ff; 
}*/

.quiz-question {
  font-size: 14px;
  font-weight: 400;
  margin-bottom: 4px;
  margin-top: 20px;
  color: #333;
}

.quiz-options {
  display: flex;
  flex-direction: row;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  justify-content: space-evenly;
}

.option-btn {
  padding: 14px 20px;
  border: 2px solid #ddd;
  background: #fff;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
  width: 45%;
}

.option-btn:hover {
  border-color: #333;
  background: #f9f9f9;
}

.option-btn.correct {
  background: #22c55e;
  color: white;
  border-color: #22c55e;
}

.option-btn.incorrect {
  background: #ef4444;
  color: white;
  border-color: #ef4444;
}

.option-btn:disabled {
  cursor: not-allowed;
}

/* Searchable Dropdown */
.search-container {
  position: relative;
  margin-bottom: 20px;
}

.search-input {
  width: 100%;
  padding: 14px;
  border: 2px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
  box-sizing: border-box;
}

.search-input:focus {
  outline: none;
  border-color: #333;
}

.dropdown-list {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: #fff;
  border: 2px solid #ddd;
  border-top: none;
  border-radius: 0 0 8px 8px;
  max-height: 250px;
  overflow-y: auto;
  display: none;
  z-index: 100;
}

.dropdown-list.show {
  display: block;
}

.dropdown-item {
  padding: 12px 14px;
  cursor: pointer;
  border-bottom: 1px solid #f0f0f0;
}

.dropdown-item:hover {
  background: #f5f5f5;
}

.dropdown-item:last-child {
  border-bottom: none;
}

/* Action Buttons */
.quiz-actions {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}

.action-btn {
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
}

.btn-primary {
  background: #333;
  color: white;
}

.btn-primary:hover {
  background: #222;
}

.btn-secondary {
  background: #f5f5f5;
  color: #333;
  border: 1px solid #ddd;
}

.btn-secondary:hover {
  background: #ececec;
}

.btn-skip {
  background: #f59e0b;
  color: white;
}

.btn-skip:hover {
  background: #d97706;
}

/* Hint Overlay */
.hint-box {
  background: #eff6ff;
  border: 2px solid #3b82f6;
  border-radius: 8px;
  padding: 16px;
  margin: 0;
  text-align: left;
  display: none;
  position: absolute;
  top: 72px;
  left: 24px;
  right: 24px;
  z-index: 30;
  box-shadow: 0 12px 28px rgba(0,0,0,0.18);
}

.hint-box.show {
  display: block;
}

.hint-title {
  font-weight: 600;
  color: #1e40af;
  margin-bottom: 8px;
}

.hint-text {
  color: #1e3a8a;
  line-height: 1.5;
}

/* Feedback */
.feedback {
  padding: 16px;
  border-radius: 8px;
  /* margin: 16px 0; */
  font-weight: 500;
  display: none;

  position: absolute;
  transform: translateY(-3rem);
}

.feedback.show {
  display: block;
}

.feedback.show.auto-dismiss {
  animation: fadeOut 0.6s ease-in-out forwards;
  animation-delay: 2s;
}

@keyframes fadeOut {
  0% {
    opacity: 1;
  }
  80% {
    opacity: 1; /* stays visible */
  }
  100% {
    opacity: 0;
    visibility: hidden;
  }
}


.feedback.correct {
  background: #dcfce7;
  color: #166534;
  border: 2px solid #22c55e;
}

.feedback.incorrect {
  background: #fee2e2;
  color: #991b1b;
  border: 2px solid #ef4444;
}

/* Mobile tweaks */
@media (max-width: 600px) {
  th, td {
    padding: 10px;
  }

  img {
    width: 40px;
  }

  h1 {
    font-size: 18px;
  }

  .app-header {
    padding: 10px 12px;
  }

  .quiz-container {
    padding: 8px;
  }

  .quiz-flag {
    max-width: 240px;
    display: block;
    margin: 0 auto;
  }

  .flag-row {
    position: relative;
    width: fit-content;
    margin: 0 auto;
  }

  .hint-box {
    top: 66px;
    left: 12px;
    right: 12px;
  }

  .option-btn, .search-input {
    font-size: 14px;
  }
}

/* Modal Background */
.modal {
  display: none;
  position: fixed;
  z-index: 100;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
}

/* Modal Content */
.modal-content {
  position: relative;
  margin: auto;
  top: 50%;
  transform: translateY(-50%);
  background: #fff;
  padding: 24px;
  border-radius: 16px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  max-height: 80vh;
  overflow-y: auto;
}

/* Flag */
.modal-content img {
  width: 100%;
  max-width: 280px;
  border: 1px solid #eee;
  margin-bottom: 16px;
}

/* Close button */
.close {
  position: absolute;
  top: 12px;
  right: 16px;
  color: #aaa;
  font-size: 32px;
  font-weight: bold;
  cursor: pointer;
  line-height: 1;
}

.close:hover {
  color: #000;
}

/* Modal Name */
.modal-name {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 12px;
}

/* Modal Description */
.modal-description {
  text-align: left;
  line-height: 1.6;
  color: #333;
}
</style>
</head>
<body>

<div class="start-modal" id="startModal">
  <div class="start-card">
    <div class="start-header">
      <div class="start-logo">Asia</div>
      <h2>Choose a Mode</h2>
      <p>Learn flags by browsing, quick choices, or searchable recall.</p>
    </div>

    <div class="start-modes" id="startModes">
      <button class="start-mode-btn" data-mode="practice">
        <span class="start-mode-icon">01</span>
        <span class="start-mode-name">Practice / Learning</span>
        <span class="start-mode-desc">Browse countries by region and inspect each flag.</span>
      </button>
      <button class="start-mode-btn" data-mode="quiz-mcq">
        <span class="start-mode-icon">02</span>
        <span class="start-mode-name">Flag Quiz</span>
        <span class="start-mode-desc">Pick the correct country from four choices.</span>
      </button>
      <button class="start-mode-btn" data-mode="quiz-dropdown">
        <span class="start-mode-icon">03</span>
        <span class="start-mode-name">Searchable Quiz</span>
        <span class="start-mode-desc">Type and select the country for each flag.</span>
      </button>
    </div>
  </div>
</div>

<div class="app-header">
  <h1>Asia – Interactive Learning</h1>
  <button class="title-close dsplyNone" id="titleBarClose" type="button" aria-label="Choose another mode">X</button>
</div>

<!-- Main Mode Tabs -->
<div class="mode-tabs dsplyNone">
  <button class="active" onclick="switchMode('practice')">Practice / Learning</button>
  <button onclick="switchMode('quiz-mcq')">Flag Quiz (Multiple Choice)</button>
  <button onclick="switchMode('quiz-dropdown')">Flag Quiz (Searchable)</button>
</div>

<!-- Practice Mode -->
<div id="practice" class="mode-content active">
  <div class="tab" id="tabButtons"></div>
  <div id="tabContent"></div>
</div>

<!-- Quiz MCQ Mode -->
<div id="quiz-mcq" class="mode-content">
  <div class="quiz-container">
    <div class="quiz-stats">
      <div class="stat-item">
        <div class="stat-value correct" id="mcq-correct">0</div>
        <div class="stat-label">Correct</div>
      </div>
      <div class="stat-item">
        <div class="stat-value incorrect" id="mcq-incorrect">0</div>
        <div class="stat-label">Incorrect</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="mcq-total">0</div>
        <div class="stat-label">Remaining</div>
      </div>
    </div>

    <div class="quiz-card">
      <div class="flag-row">
        <img id="mcq-flag" class="quiz-flag" src="" alt="Flag">
        <div class="onepx"><div class="hint-icon" id="mcq-hint-btn" type="button" onclick="toggleHint('mcq')"></div></div>
      </div>
      <div class="quiz-question">Which country does this flag belong to?</div>
      
      <div class="hint-box" id="mcq-hint">
        <div class="hint-title">Hint:</div>
        <div class="hint-text" id="mcq-hint-text"></div>
      </div>

      <div class="onepxHt"><div class="feedback" id="mcq-feedback"></div></div>

      <div class="quiz-options" id="mcq-options"></div>

      <div class="quiz-actions">
        <button class="action-btn btn-secondary" id="btnPass" onclick="passQuestion('mcq')">Pass</button>
        <button class="action-btn btn-skip" id="btnSkip" onclick="skipWithoutAnswer('mcq')">Skip</button>  
        <button class="action-btn btn-primary" onclick="nextQuestion('mcq')" style="display: none;" id="mcq-next">Next Question</button>
      </div>
    </div>
  </div>
</div>

<!-- Quiz Dropdown Mode -->
<div id="quiz-dropdown" class="mode-content">
  <div class="quiz-container">
    <div class="quiz-stats">
      <div class="stat-item">
        <div class="stat-value correct" id="dropdown-correct">0</div>
        <div class="stat-label">Correct</div>
      </div>
      <div class="stat-item">
        <div class="stat-value incorrect" id="dropdown-incorrect">0</div>
        <div class="stat-label">Incorrect</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="dropdown-total">0</div>
        <div class="stat-label">Total</div>
      </div>
    </div>

    <div class="quiz-card">
      <div class="flag-row">
        <img id="dropdown-flag" class="quiz-flag" src="" alt="Flag">
        <div class="onepx"><div class="hint-icon" id="dropdown-hint-btn" type="button" onclick="toggleHint('dropdown')" aria-label="Toggle hint" aria-expanded="false"></div></div>
      </div>
      <div class="quiz-question">Which country does this flag belong to?</div>

      <div class="hint-box" id="dropdown-hint">
        <div class="hint-title">Hint:</div>
        <div class="hint-text" id="dropdown-hint-text"></div>
      </div>

    <div class="onepxHt"><div class="feedback" id="dropdown-feedback"></div></div>      
    

      <div class="search-container">
        <input 
          type="text" 
          class="search-input" 
          id="dropdown-search" 
          placeholder="Search for a country..."
          autocomplete="off"
        >
        <div class="dropdown-list" id="dropdown-list"></div>
      </div>

      <div class="quiz-actions">
        <button class="action-btn btn-secondary" id="btnPassQuiz" onclick="passQuestion('dropdown')">Pass</button>
        <button class="action-btn btn-skip" id="btnSkipQuiz" onclick="skipWithoutAnswer('dropdown')">Skip</button>
        <button class="action-btn btn-primary" onclick="nextQuestion('dropdown')" style="display: none;" id="dropdown-next">Next Question</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal for Practice Mode -->
<div id="countryModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <img id="modalFlag" src="" alt="Country Flag">
    <div class="modal-name" id="modalName"></div>
    <div class="modal-description" id="modalDescription"></div>
  </div>
</div>

<script>
const data = {
  "South Asia": [
    { name: "India", code: "in", description: "A horizontal tricolor of deep saffron (orange) at the top, white in the middle, and India green at the bottom, with the Ashoka Chakra (a 24-spoke blue wheel) in the center of the white band. The saffron represents courage and sacrifice, white symbolizes peace and truth, and green represents faith and chivalry. The Ashoka Chakra represents the eternal wheel of law (dharma)." },
    { name: "Bangladesh", code: "bd", description: "A dark green field with a red disk slightly offset toward the hoist. The green represents the lush landscape of Bangladesh and its vitality, while the red disk represents the blood shed during the Bangladesh Liberation War and the rising sun of independence." },
    { name: "Pakistan", code: "pk", description: "A green field with a white crescent moon and five-rayed star at the center, and a white vertical stripe at the hoist side. Green represents Islam and the Muslim majority, white represents religious minorities and peace. The crescent represents progress and the star represents light and knowledge." },
    { name: "Sri Lanka", code: "lk", description: "A complex flag featuring a yellow-bordered maroon field with a golden lion holding a kastane sword in its right fore-paw, and four bo leaves in each corner. On the hoist side are vertical green and orange stripes. The lion represents bravery, the sword represents sovereignty, and the bo leaves represent Buddhism. The colors represent minorities: orange for Tamils and green for Muslims." },
    { name: "Nepal", code: "np", description: "The world's only non-rectangular national flag, consisting of two stacked triangular pennants. The crimson red represents the rhododendron (the national flower) and the bravery of the Nepali people. The blue border signifies peace. The upper pennant contains a white moon with eight rays, and the lower contains a white twelve-rayed sun, symbolizing the hope that Nepal will last as long as these celestial bodies." },
    { name: "Bhutan", code: "bt", description: "A diagonal division with yellow (upper hoist) and orange (lower fly), and a large white dragon (Druk) across the middle holding jewels in its claws. Yellow represents the secular authority of the king, orange represents Buddhist spiritual tradition, and the dragon represents the name of the country (Druk Yul means 'Land of the Thunder Dragon'). The jewels represent wealth and security." },
    { name: "Maldives", code: "mv", description: "A green rectangle with a white crescent in the center, all on a red field. The green represents peace and prosperity, the white crescent symbolizes Islam (the state religion), and the red represents the boldness of the nation's heroes and their willingness to sacrifice their blood for the country." },
    { name: "Afghanistan", code: "af", description: "Three equal vertical bands of black (hoist side), red, and green, with the national emblem in white centered on the red band. Black represents the dark past, red symbolizes the blood shed for independence, and green represents hope and prosperity. The emblem features a mosque with a mihrab and minbar." }
  ],
  "Southeast Asia": [
    { name: "Indonesia", code: "id", description: "A simple bicolor with a red horizontal band over a white horizontal band. Red represents courage and the blood of those who fought for independence, while white represents purity and the spirit of the people. This design dates back to the 13th-century Majapahit Empire." },
    { name: "Malaysia", code: "my", description: "Fourteen alternating red and white horizontal stripes with a dark blue rectangle (canton) in the upper hoist-side corner featuring a yellow crescent and a yellow 14-pointed star (Bintang Persekutuan). The 14 stripes and points represent the equal status of the 13 member states and the federal government. Red, white, and blue are traditional Malay colors. The crescent represents Islam, and the star symbolizes the unity of the states." },
    { name: "Singapore", code: "sg", description: "A horizontal bicolor of red (top) and white (bottom), with a white crescent moon and five white stars arranged in a circle in the upper hoist corner. Red represents universal brotherhood and equality, white symbolizes purity and virtue. The crescent represents a young nation on the rise, and the five stars represent democracy, peace, progress, justice, and equality." },
    { name: "Thailand", code: "th", description: "Five horizontal stripes of red, white, blue (double width in center), white, and red. The colors represent the nation (red), Buddhism (white), and the monarchy (blue). The tricolor design was adopted in 1917, and the wide blue stripe distinguishes it from similar flags." },
    { name: "Philippines", code: "ph", description: "A horizontal bicolor of blue (top) and red (bottom), with a white equilateral triangle at the hoist. Inside the triangle are a golden-yellow sun with eight primary rays and three five-pointed stars in each corner. The blue represents peace, truth, and justice; red symbolizes patriotism and valor; white stands for equality and fraternity. The eight sun rays represent the eight provinces that first revolted against Spanish rule, and the three stars represent the three main island groups (Luzon, Visayas, and Mindanao). Unique feature: the flag is flipped upside down during wartime." },

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

// Initialize
const tabButtons = document.getElementById("tabButtons");
const tabContent = document.getElementById("tabContent");

// Create a flat list of all countries
const allCountries = [];
Object.keys(data).forEach(region => {
  data[region].forEach(country => {
    allCountries.push(country);
  });
});


// Quiz state
const quizState = {
  mcq: initQuizState(),
  dropdown: initQuizState()
};

function initQuizState() {
  return {
    correct: 0,
    incorrect: 0,
    passed: 0,
    currentCountry: null,
    answered: false,

    seen: new Set(),        // all shown countries
    skipped: [],            // skipped countries (not shown)
    pool: shuffle([...allCountries]) // working queue
  };
}

// Build Practice Mode
Object.keys(data).forEach((region, index) => {
  const btn = document.createElement("button");
  btn.innerText = region;
  btn.onclick = () => openTab(region, btn);
  if (index === 0) btn.classList.add("active");
  tabButtons.appendChild(btn);

  const div = document.createElement("div");
  div.id = region;
  div.className = "tabcontent";
  if (index === 0) div.style.display = "block";

  const table = document.createElement("table");
  const tbody = document.createElement("tbody");
  
  data[region].forEach(country => {
    const countryIndex = allCountries.findIndex(c => c.code === country.code);
    const row = document.createElement("tr");
    row.style.cursor = "pointer";
    row.onclick = () => openModal(countryIndex);
    
    row.innerHTML = `
      <td><img src="https://flagcdn.com/w160/${country.code}.png"></td>
      <td>${country.name}</td>
    `;
    
    tbody.appendChild(row);
  });
  
  table.appendChild(tbody);
  div.appendChild(table);
  tabContent.appendChild(div);
});

function openTab(region, element) {
  document.querySelectorAll(".tabcontent").forEach(tc => tc.style.display = "none");
  document.querySelectorAll(".tab button").forEach(btn => btn.classList.remove("active"));

  document.getElementById(region).style.display = "block";
  element.classList.add("active");
}

// Modal for Practice Mode
const modal = document.getElementById("countryModal");
const modalFlag = document.getElementById("modalFlag");
const modalName = document.getElementById("modalName");
const modalDescription = document.getElementById("modalDescription");
const closeBtn = document.querySelector(".close");

function openModal(countryIndex) {
  const country = allCountries[countryIndex];
  modal.style.display = "block";
  modalFlag.src = `https://flagcdn.com/w640/${country.code}.png`;
  modalName.innerText = country.name;
  modalDescription.innerText = country.description;
}

closeBtn.onclick = () => modal.style.display = "none";
window.onclick = (e) => {
  if (e.target === modal) modal.style.display = "none";
};
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") modal.style.display = "none";
});

// Mode Switching
function showModeSelection() {
  document.getElementById('startModal').classList.remove('dsplyNone');
  document.getElementById('titleBarClose').classList.add('dsplyNone');
}

function switchMode(mode, trigger) {
  document.querySelectorAll(".mode-content").forEach(m => m.classList.remove("active"));
  document.querySelectorAll(".mode-tabs button").forEach(btn => btn.classList.remove("active"));
  
  document.getElementById(mode).classList.add("active");
  if (trigger) {
    trigger.classList.add("active");
  } else {
    const tabButton = document.querySelector(`.mode-tabs button[onclick*="${mode}"]`);
    if (tabButton) tabButton.classList.add("active");
  }
  document.getElementById('titleBarClose').classList.remove('dsplyNone');

  if (mode === 'quiz-mcq') {
    loadQuestion('mcq');
  } else if (mode === 'quiz-dropdown') {
    document.getElementById('dropdown-search').disabled = false;
    loadQuestion('dropdown');
  }
}

document.getElementById('startModes').addEventListener('click', function(e) {
  const btn = e.target.closest('.start-mode-btn');
  if (!btn) return;

  document.getElementById('startModal').classList.add('dsplyNone');
  switchMode(btn.getAttribute('data-mode'));
  window.scrollTo(0, 0);
});

document.getElementById('titleBarClose').addEventListener('click', showModeSelection);

// Quiz Functions
function getRandomCountry() {
  return allCountries[Math.floor(Math.random() * allCountries.length)];
}

function getRandomOptions(correctCountry, count = 4) {
  const options = [correctCountry];
  while (options.length < count) {
    const random = getRandomCountry();
    if (!options.find(o => o.code === random.code)) {
      options.push(random);
    }
  }
  return options.sort(() => Math.random() - 0.5);
}

function removeCountryName(description, countryName) {
  return description.replace(new RegExp(countryName, 'gi'), '[This country]');
}

function loadQuestion(mode) {
  const state = quizState[mode];

  // 🛑 If no more countries left → handle completion
  if (state.pool.length === 0) {
    handleQuizCompletion(mode);
    return;
  }

  // ✅ Take NEXT country from pool (not random)
  const country = state.pool.shift();

  state.currentCountry = country;
  state.answered = false;
  state.seen.add(country.code);

  // const country = getRandomCountry();
  quizState[mode].currentCountry = country;
  quizState[mode].answered = false;

  // Reset UI
  document.getElementById(`${mode}-hint`).classList.remove('show');
  document.getElementById(`${mode}-hint-btn`).classList.remove('active');
  document.getElementById(`${mode}-hint-btn`).setAttribute('aria-expanded', 'false');
  document.getElementById(`${mode}-feedback`).classList.remove('show', 'correct', 'incorrect', 'auto-dismiss');
  document.getElementById(`${mode}-next`).style.display = 'none';

  // Set flag
  document.getElementById(`${mode}-flag`).src = `https://flagcdn.com/w640/${country.code}.png`;
  
  // Set hint text
  const cleanedDescription = removeCountryName(country.description, country.name);
  document.getElementById(`${mode}-hint-text`).innerText = cleanedDescription;

  if (mode === 'mcq') {
    loadMCQOptions(country);
  } else if (mode === 'dropdown') {
    loadDropdownOptions();
  }
}

function loadMCQOptions(country) {
  const options = getRandomOptions(country);
  const container = document.getElementById('mcq-options');
  container.innerHTML = '';

  options.forEach(option => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = option.name;
    btn.onclick = () => checkAnswer('mcq', option.name);
    container.appendChild(btn);
  });
}

function loadDropdownOptions() {
  const searchInput = document.getElementById('dropdown-search');
  const dropdownList = document.getElementById('dropdown-list');
  
  searchInput.value = '';
  dropdownList.innerHTML = '';
  dropdownList.classList.remove('show');

  // Populate dropdown with all countries
  const sortedCountries = [...allCountries].sort((a, b) => a.name.localeCompare(b.name));
  
  searchInput.addEventListener('input', function() {
    const searchTerm = this.value.toLowerCase();
    dropdownList.innerHTML = '';
    
    if (searchTerm) {
      const filtered = sortedCountries.filter(c => c.name.toLowerCase().includes(searchTerm));
      
      if (filtered.length > 0) {
        filtered.forEach(country => {
          const item = document.createElement('div');
          item.className = 'dropdown-item';
          item.textContent = country.name;
          item.onclick = () => selectDropdownCountry(country.name);
          dropdownList.appendChild(item);
        });
        dropdownList.classList.add('show');
      } else {
        dropdownList.classList.remove('show');
      }
    } else {
      dropdownList.classList.remove('show');
    }
  });

  searchInput.addEventListener('focus', function() {
    if (this.value && dropdownList.children.length > 0) {
      dropdownList.classList.add('show');
    }
  });

  // Close dropdown when clicking outside
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-container')) {
      dropdownList.classList.remove('show');
    }
  });
}

function selectDropdownCountry(countryName) {
  const searchInput = document.getElementById('dropdown-search');
  const dropdownList = document.getElementById('dropdown-list');
  
  searchInput.value = countryName;
  dropdownList.classList.remove('show');
  
  checkAnswer('dropdown', countryName);
}

function hideSkipPassBtns(mode) {
  console.log('Hiding skip/pass buttons for mode:', mode);
  var passBtn, skipBtn;
  if (mode === 'mcq') {
    passBtn = document.getElementById('btnPass');
    skipBtn = document.getElementById('btnSkip');
    
  } else {
    passBtn = document.getElementById('btnPassQuiz');
    skipBtn = document.getElementById('btnSkipQuiz');
  }

  console.log('Pass button:', passBtn, 'Skip button:', skipBtn);

  passBtn.style.display = 'none'; // hide pass button after answering
  skipBtn.style.display = 'none'; // hide skip button after answering
}

function checkAnswer(mode, selectedName) {
  hideSkipPassBtns(mode); // hide skip/pass buttons once an answer is selected

  if (quizState[mode].answered) return;

  const correct = selectedName === quizState[mode].currentCountry.name;
  quizState[mode].answered = true;

  const feedback = document.getElementById(`${mode}-feedback`);
  // feedback.classList.add('show');
  feedback.classList.add('show', 'auto-dismiss');

  if (correct) {
    quizState[mode].correct++;
    feedback.classList.add('correct');
    feedback.textContent = `✓ Correct! This is ${quizState[mode].currentCountry.name}`;
    
    if (mode === 'mcq') {
      const buttons = document.querySelectorAll('#mcq-options .option-btn');
      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === selectedName) {
          btn.classList.add('correct');
        }
      });
    } else {
      document.getElementById('dropdown-search').disabled = true;
    }
  } else {
    quizState[mode].incorrect++;
    feedback.classList.add('incorrect');
    feedback.textContent = `✗ Incorrect. This is ${quizState[mode].currentCountry.name}`;
    
    if (mode === 'mcq') {
      const buttons = document.querySelectorAll('#mcq-options .option-btn');
      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === selectedName) {
          btn.classList.add('incorrect');
        }
        if (btn.textContent === quizState[mode].currentCountry.name) {
          btn.classList.add('correct');
        }
      });
    } else {
      document.getElementById('dropdown-search').disabled = true;
    }
  }

  updateStats(mode);
  document.getElementById(`${mode}-next`).style.display = 'inline-block';
}

function updateStats(mode) {
  const state = quizState[mode];

  document.getElementById(`${mode}-correct`).textContent = state.correct;
  document.getElementById(`${mode}-incorrect`).textContent = state.incorrect;

  const remaining = state.pool.length;
  document.getElementById(`${mode}-total`).textContent = remaining;
}

function toggleHint(mode) {
  const hint = document.getElementById(`${mode}-hint`);
  const button = document.getElementById(`${mode}-hint-btn`);
  const isOpen = hint.classList.toggle('show');
  button.classList.toggle('active', isOpen);
  button.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
}

function skipQuestion(mode) {
console.log('Skip question in mode:', mode);
  if (!quizState[mode].answered) {
    const feedback = document.getElementById(`${mode}-feedback`);
    feedback.classList.add('show', 'incorrect');
    feedback.textContent = `Skipped. This was ${quizState[mode].currentCountry.name}`;
    quizState[mode].answered = true;
    
    if (mode === 'mcq') {
      const buttons = document.querySelectorAll('#mcq-options .option-btn');
      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === quizState[mode].currentCountry.name) {
          btn.classList.add('correct');
        }
      });
    } else {
      document.getElementById('dropdown-search').disabled = true;
    }
    
    document.getElementById(`${mode}-next`).style.display = 'inline-block';
  }
}

function nextQuestion(mode) {
  const passBtn = document.getElementById(mode === 'mcq' ? 'btnPass' : 'btnPassQuiz');
  const skipBtn = document.getElementById(mode === 'mcq' ? 'btnSkip' : 'btnSkipQuiz');
  if (mode === 'dropdown') {
    document.getElementById('dropdown-search').disabled = false;
  //   passBtn = document.getElementById('btnPassQuiz');
  //   skipBtn = document.getElementById('btnSkipQuiz');    

  }
  // else{
  //   passBtn = document.getElementById('btnPass');
  //   skipBtn = document.getElementById('btnSkip');
  // }
  loadQuestion(mode);

  
  passBtn.style.display = ''; // show pass button for next question
  skipBtn.style.display = ''; // show skip button for next question
}

// Initialize first quiz questions
loadQuestion('mcq');
loadQuestion('dropdown');

function passQuestion(mode) {
  hideSkipPassBtns(mode);

  const state = quizState[mode];
  if (state.answered) return;

  state.answered = true;
  state.passed++;

  const feedback = document.getElementById(`${mode}-feedback`);
  feedback.classList.add('show', 'incorrect');
  feedback.textContent = `Answer: ${state.currentCountry.name}`;

  if (mode === 'mcq') {
    const buttons = document.querySelectorAll('#mcq-options .option-btn');
    buttons.forEach(btn => {
      btn.disabled = true;
      if (btn.textContent === state.currentCountry.name) {
        btn.classList.add('correct');
      }
    });
  } else {
    document.getElementById('dropdown-search').disabled = true;
  }

  updateStats(mode);
  document.getElementById(`${mode}-next`).style.display = 'inline-block';
}

function skipWithoutAnswer(mode) {
  

  const state = quizState[mode];
  if (state.answered) return;

  state.skipped.push(state.currentCountry);

  loadQuestion(mode); // directly move forward
}

function handleQuizCompletion(mode) {
  const state = quizState[mode];

  if (state.skipped.length > 0) {
    const retry = confirm(
      `All countries completed!\n\nDo you want to attempt ${state.skipped.length} skipped countries?`
    );

    if (retry) {
      state.pool = shuffle([...state.skipped]);
      state.skipped = [];
      loadQuestion(mode);
      return;
    }
  }

  alert("Quiz complete! 🎉");

  // Reset (optional)
  quizState[mode] = initQuizState();
  loadQuestion(mode);
}
