<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asia – 49 Sovereign States</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #fafaf7;
}

/* Header */
h1 {
  text-align: center;
  padding: 16px;
  margin: 0;
  font-size: 20px;
}

/* Tabs */
.tab {
  display: flex;
  overflow-x: auto;
  background: #fff;
  border-bottom: 1px solid #eee;
  position: sticky;
  top: 0;
  z-index: 10;
}

.tab button {
  flex: none;
  padding: 12px 16px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 14px;
  white-space: nowrap;
}

.tab button.active {
  border-bottom: 2px solid #333;
  font-weight: bold;
}

/* Tab Content */
.tabcontent {
  display: none;
  padding: 12px;
}

/* Table */
table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border-radius: 8px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
}

th {
  background: #f5f5f5;
  text-align: left;
}

/* Flag */
img {
  width: 48px;
  border: 1px solid #eee;
}

/* Mobile tweaks */
@media (max-width: 600px) {
  th, td {
    padding: 10px;
  }

  img {
    width: 40px;
  }

  h1 {
    font-size: 18px;
  }
}

/* Modal Background */
.modal {
  display: none;
  position: fixed;
  z-index: 100;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
}

/* Modal Content */
.modal-content {
  position: relative;
  margin: auto;
  top: 50%;
  transform: translateY(-50%);
  background: #fff;
  padding: 24px;
  border-radius: 16px;
  width: 90%;
  max-width: 400px;
  text-align: center;
}

/* Flag */
.modal-content img {
  width: 100%;
  max-width: 280px;
  border: 1px solid #eee;
  margin-bottom: 16px;
}

/* Country name */
.modal-content h2 {
  margin: 0;
}

/* Close button */
.close {
  position: absolute;
  top: 12px;
  right: 16px;
  font-size: 24px;
  cursor: pointer;
}

</style>
</head>

const tabButtons = document.getElementById("tabButtons");
const tabContent = document.getElementById("tabContent");

Object.keys(data).forEach((region, index) => {
  // Create tab button
  const btn = document.createElement("button");
  btn.innerText = region;
  btn.onclick = () => openTab(region, btn);
  if (index === 0) btn.classList.add("active");
  tabButtons.appendChild(btn);

  // Create tab content
  const div = document.createElement("div");
  div.id = region;
  div.className = "tabcontent";
  if (index === 0) div.style.display = "block";

  div.innerHTML = `
    <table>
      
      <tbody>
        ${data[region].map(c => `
          <tr onclick="openModal('${c.name}', '${c.code}')">
            <td><img src="https://flagcdn.com/w160/${c.code}.png"></td>
            <td>${c.name}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;

  tabContent.appendChild(div);
});

function openTab(region, element) {
  document.querySelectorAll(".tabcontent").forEach(tc => tc.style.display = "none");
  document.querySelectorAll(".tab button").forEach(btn => btn.classList.remove("active"));

  document.getElementById(region).style.display = "block";
  element.classList.add("active");
}

const modal = document.getElementById("countryModal");
const modalFlag = document.getElementById("modalFlag");
const modalName = document.getElementById("modalName");
const closeBtn = document.querySelector(".close");

function openModal(name, code) {
  console.log(name, code);
  modal.style.display = "block";
  modalFlag.src = `https://flagcdn.com/w640/${code}.png`;
  modalName.innerText = name;
}

// Close on X click
closeBtn.onclick = () => modal.style.display = "none";

// Close on outside click
window.onclick = (e) => {
  if (e.target === modal) {
    modal.style.display = "none";
  }
};

// Close on ESC key
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    modal.style.display = "none";
  }
});
